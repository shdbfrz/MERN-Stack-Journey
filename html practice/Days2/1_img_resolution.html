<!-- 
 1-> resoultion img such as phone (576px-752px), laptop(992px-1199px) ,large devices (1200px), tablet (768px-991px) --
        sol:
           min-width=1200px then show large devices img(img1)
           min-width=992px then show laptop img(img2)
           min-width=768px then show tablet img(img3)
           min-width=576px then show phone img(img4)
  -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <picture>
        <source media="(min-width: 1200px)" srcset="images/images.jpg">
        <source media="(min-width: 992px)" srcset="images/images.jpg">
        <source media="(min-width: 768px)" srcset="images/images.jpg">
        <source media="(min-width: 576px)" srcset="images/images.jpg">
        <img src="images/images.jpg" alt="Description">
        </picture>
</body>
</html>
