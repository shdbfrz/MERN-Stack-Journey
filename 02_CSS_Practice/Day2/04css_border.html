<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Border</title>
    <style>
     

        p {
        border: 2px solid rgb(92, 17, 17);
        border-radius: 10px;
        border-color: aqua;
        border-width: 5px;
        border-style: dotted;

        border-left: 10px solid red;
        border-right: 5px solid red;
        border-top: 5px solid skyblue;

        /* padding: 20px; */

        padding-top: 100px;
        padding-right: 50px;
        padding-bottom: 100px;
        padding-left: 50px;


        /* margin: 20px; */
        margin-top: 50px;
        margin-right: 100px;
        margin-bottom: 50px;
        margin-left: 100px;

        }

    </style>
</head>
<body>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Fugiat sed laboriosam sunt magni officia commodi ab? Amet blanditiis iure, in quae animi, vel itaque facilis molestiae labore, eligendi nam aperiam!

    </p>
</body>
</html>
