<!DOCTYPE html> <!-- HTML5 document declare karta hai. Browser ko batata hai ki modern HTML standard use karna hai. -->

<html lang="en"> <!-- Root tag. Pura webpage isi ke andar hota hai.
                      lang="en" browser aur search engine ko batata hai ki page English me hai. -->

<head> <!-- Webpage ki metadata (information) rakhta hai. Ye content webpage par direct nahi dikhta. -->

    <meta charset="UTF-8"> <!-- UTF-8 character encoding use karta hai. Hindi, English, Emoji sab sahi display hote hain. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Mobile responsive banane ke liye.
         width=device-width → Screen ki width ke according page set hota hai.
         initial-scale=1.0 → Initial zoom 100% rakhta hai. -->

    <title>Document</title> <!-- Browser tab me dikhne wala title. -->

</head>

<body bgcolor="lightblue" text="blue" background="images/images.jpg">
<!-- Body tag ke andar webpage ka visible content hota hai.

     bgcolor="lightblue"
     → Page ka background color set karta hai. (Deprecated)

     text="blue"
     → Default text color set karta hai. (Deprecated)

     background="images/images.jpg"
     → Background image set karta hai. (Deprecated)
-->

    <h1>My First Heading</h1> <!-- h1 = Sabse badi heading. SEO ke liye important. -->

    <p>lore ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <!-- p = Paragraph tag.

         Note:
         "lore ipsum" galat hai.
         Sahi spelling "Lorem Ipsum" hoti hai.

         Lorem Ipsum = Dummy placeholder text.
         Jab actual content ready nahi hota tab testing aur design ke liye use kiya jata hai.
    -->

</body>

</html>
