<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <!--
        <a> = Anchor Tag

        Purpose:
        Hyperlink (Link) create karne ke liye use hota hai.

        Syntax:
        <a href="URL">Link Name</a>

        By Default:
        - Blue color me dikhta hai.
        - Underline hota hai.
        - Click karne par link open karta hai.
    -->

    <!--
    <a href="https://www.google.com">Google</a>

    href = Hypertext Reference

    Purpose:
    Jis webpage ya resource par jana hai uska address (URL) define karta hai.

    Output:
    Google naam ka clickable link banega.
    Click karne par Google open hoga.
    -->



    <!--
    <a href="https://www.linkedin.com/in/shadab-firoz-38031a30b/">LinkedIn</a>

    href
    → LinkedIn profile ka URL.

    Click karne par LinkedIn profile open hogi.
    -->



    <!--
    <a href="https://www.github.com/shdbfrz" target="_blank">GitHub</a>

    target
    → Link kaha open hoga ye decide karta hai.

    target="_blank"
    → Link New Tab me open hoga.

    Agar target na likho
    → Current tab me hi open hoga.
    -->



    <!--
    <a href="6386867896">&#128222; Call the please</a>

    Ye phone call ke liye sahi syntax nahi hai.

    Mobile se call karne ke liye generally
    href="tel:PhoneNumber"
    use kiya jata hai.

    (Code change nahi kiya gaya hai.)
    -->



    <a href="mailto:shdbfrz@gmail.com">Email Me</a>
    <!--

    href="mailto:shdbfrz@gmail.com"

    mailto:
    → Email Protocol hai.

    Purpose:
    User ke default Email App (Gmail, Outlook, etc.)
    ko open karta hai aur email compose window khol deta hai.

    Output:
    "Email Me" par click karne se
    shdbfrz@gmail.com ke naam se compose window open hogi.

    -->



    <a href="mailto:demo@gmail.com">Demo Email</a>
    <!--

    Ek aur mailto link.

    Click karne par
    demo@gmail.com ke liye compose window open hogi.

    -->


</body>
</html>
