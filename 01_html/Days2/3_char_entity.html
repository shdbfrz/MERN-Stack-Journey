   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      &copy;
    <!-- &copy; = Copyright Symbol (©)

         HTML Entity hai.
         Browser isse © symbol me convert kar deta hai.

         Jab kisi content, website, software ya document par
         ownership dikhani ho tab use hota hai.

         Output:
         ©
    -->

    &reg;
    <!-- &reg; = Registered Trademark Symbol (®)

         HTML Entity hai.

         Registered Brand ya Company ke naam ke saath use hota hai.

         Output:
         ®
    -->

    &trade;
    <!-- &trade; = Trademark Symbol (™

         HTML Entity hai.

         Kisi product ya brand ke trademark ko show karta hai.

         Ye Registered Trademark (®) se alag hota hai.

         Output:
         ™
    -->

    &#169;
    <!-- &#169; = Copyright Symbol (©)

         &# = Numeric Character Entity ka start hota hai.

         169 = Unicode / ASCII Character Code.

         Ye &copy; ke equal hai.

         Output:
         ©
    -->

    &#174;
    <!-- &#174; = Registered Trademark Symbol (®)

         Numeric Character Entity.

         Ye &reg; ke equal hai.

         Output:
         ®
    -->

    &#8482;
    <!-- &#8482; = Trademark Symbol (™)

         Numeric Character Entity.

         Ye &trade; ke equal hai.

         Output:
         ™
    -->

    &#128222;
    <!-- &#128222; = Telephone Receiver Symbol (📞)

         Unicode Character Entity.

         Emoji ya Special Symbol ko display karne ke liye use hota hai.

         Output:
         📞
    --> 
</body>
</html>
</body>
</html>
