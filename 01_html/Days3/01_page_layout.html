<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Layout</title>
</head>

<body>

    <table border="1" width="1100px" align="center" cellspacing="0">
    <!-- table = Complete page layout banane ke liye use ki gayi hai.

         border="1"
         → Table ka border 1px.

         width="1100px"
         → Table ki fixed width.

         align="center"
         → Table ko center me rakhta hai. (Deprecated)

         cellspacing="0"
         → Cells ke beech ka gap remove karta hai.
    -->

        <thead>
        <!-- Table ka Header Section -->

            <tr>

                <th colspan="4">
                <!-- colspan="4"
                     → Header 4 columns ko merge karega.
                -->

                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7t1ItgHBFnYNvzpRMelPgHTmtCK2a7bIqo6Uypha07A&s=10"
                         width="100%"
                         height="400px" />
                    <!-- img = Image display karta hai.

                         src
                         → Image URL.

                         width="100%"
                         → Parent cell ki poori width.

                         height="400px"
                         → Image height.
                    -->

                </th>

            </tr>

            <tr>

                <th width="25%">
                    <a href="./demo5.html" target="Myframe">Home</a>
                    <!-- href → Open hone wali file.
                         target="Myframe"
                         → Link iframe jiska name="Myframe" hai usme open hoga.
                    -->
                </th>

                <th width="25%">
                    <a href="./demo6.html" target="Myframe">About</a>
                </th>

                <th width="25%">
                    <a href="./demo7.html" target="Myframe">Contact</a>
                </th>

                <th width="25%">
                    <a href="./demo8.html" target="Myframe">Services</a>
                </th>

            </tr>

        </thead>

        <tbody>
        <!-- Main Content -->

            <tr>

                <td colspan="2">
                <!-- colspan="2"
                     → Iframe 2 columns occupy karega.
                -->

                    <iframe name="Myframe"
                            width="100%"
                            height="400px">
                    </iframe>

                    <!-- iframe
                         → Dusra HTML page ya website embed karne ke liye use hota hai.

                         name="Myframe"
                         → target attribute isi naam ko use karega.
                    -->

                </td>

                <td colspan="2">

                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d7149.591372349616!2d80.43565636678285!3d26.36546956123659!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1783318338537!5m2!1sen!2sin"
                        width="100%"
                        height="400"
                        style="border:0;"
                        loading="lazy"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>

                    <!-- Google Map Embed

                         src
                         → Google Maps Embed URL.

                         loading="lazy"
                         → Map tabhi load hoga jab user uske paas scroll kare.

                         allowfullscreen
                         → Full Screen allow karta hai.

                         referrerpolicy
                         → Referrer information ko control karta hai.
                    -->

                    <br><br>

                    <iframe
                        width="100%"
                        height="315"
                        src="https://www.youtube.com/embed/jfTSDUX1ilE?si=D0kbUkS78UTXTqRR"
                        title="YouTube video player"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>

                    <!-- YouTube Video Embed

                         frameborder="0"
                         → Border remove karta hai.

                         allow
                         → Browser permissions deta hai.

                         allowfullscreen
                         → Full Screen mode enable karta hai.
                    -->

                </td>

            </tr>

        </tbody>

        <tfoot>
        <!-- Footer Section -->

            <tr>

                <td colspan="2">
                    Footer
                </td>

                <td colspan="2">
                    Footer
                </td>

            </tr>

        </tfoot>

    </table>

</body>
</html>
