<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table  align="center" border="3" width="500px" >
          <tbody >
           <tr>

            <td>
             Enter your name:
            </td>
               <td>
                 <input type="text">
               </td>  </tr> 
               <tr>
              <td>
                 enter the password:
              </td>
              <td>
                 
                <input type="password">
              </td>  </tr>
              <tr>
            <td>

             Date of birth:
            </td>
               <td>
                 <input type="date" min="2026-05-25" max="2026-06-25">
               </td>
              </tr>
             <tr>

            <td>
             Enter your Mobile number:
            </td>
               <td>
                 <input type="number">
               </td>  </tr> 

            <tr>

            <td>
             Enter your Email:
            </td>
               <td>
                 <input type="email">
               </td>  </tr> 

           <tr>

            <td>
             Enter your gender:
            </td>
               <td>
                 <input type="radio" name="gen" id="male"/>
                 <label for="male"> Male</label>
                 <input type="radio" name="gen" id="female"/>
                 <label for="female"> Female</label>
                 <input type="radio" name="gen" id="other"/>
                 <label for="other"> Other</label>
                
               </td>  </tr> 

          <tr>

            <td>
             Enter your Qualification:
            </td>
               <td>
                 <select>
                    <option disabled selected >Select your Qualification</option>
                    <option value="bca">BCA</option>
                    <option value="bsc">BSC</option>
                    <option selected value="B.Tech">B.Tech</option>
                    <option value="mba">MBA</option>
                    <option disabled value="mca">MCA</option>
                 </select>


               </td>  </tr> 



          </tbody>



    </table>
</body>
</html>
