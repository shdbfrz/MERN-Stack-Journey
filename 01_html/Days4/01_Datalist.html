<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <table align="center" border="3" width="500px">
    <!-- table = Form ko table layout me arrange karne ke liye use ki gayi hai.

         align="center"
         → Table ko center me rakhta hai. (Deprecated)

         border="3"
         → Table border ki thickness.

         width="500px"
         → Table ki fixed width.
    -->

        <tbody>
        <!-- tbody = Table ke main content ko group karta hai. -->

            <tr>

                <td>
                    Enter your name:
                </td>

                <td>

                    <input type="text">
                    <!-- input = User se data lene ke liye use hota hai.

                         type="text"
                         → Single line text field create karta hai.

                         Example:
                         Name, City, College.
                    -->

                </td>

            </tr>



            <tr>

                <td>
                    Enter the password:
                </td>

                <td>

                    <input type="password">
                    <!-- type="password"

                         Password field create karta hai.

                         User jo type karta hai
                         wo dots (••••••) me hide ho jata hai.
                    -->

                </td>

            </tr>



            <tr>

                <td>
                    Date of Birth:
                </td>

                <td>

                    <input type="date"
                           min="2026-05-25"
                           max="2026-06-25">

                    <!-- type="date"
                         → Calendar picker show karta hai.

                         min
                         → Is date se pehle ki date select nahi kar sakte.

                         max
                         → Is date ke baad ki date select nahi kar sakte.
                    -->

                </td>

            </tr>



            <tr>

                <td>
                    Enter your Mobile Number:
                </td>

                <td>

                    <input type="number">
                    <!-- type="number"

                         Sirf numeric value allow karta hai.

                         Browser Up/Down arrows bhi show kar sakta hai.
                    -->

                </td>

            </tr>



            <tr>

                <td>
                    Enter your Email:
                </td>

                <td>

                    <input type="email">
                    <!-- type="email"

                         Email input field.

                         Browser basic email validation karta hai.

                         Example:
                         demo@gmail.com
                    -->

                </td>

            </tr>



            <tr>

                <td>
                    Enter your Gender:
                </td>

                <td>

                    <input type="radio"
                           name="gen"
                           id="male"/>

                    <!-- type="radio"
                         → Radio Button create karta hai.

                         name="gen"
                         → Same name hone ki wajah se
                           ek time par sirf ek option select hoga.

                         id="male"
                         → Unique Identifier.
                    -->

                    <label for="male">
                        Male
                    </label>

                    <!-- label

                         for="male"
                         → id="male" wale input se connect hota hai.

                         Label par click karne se bhi
                         Radio Button select ho jata hai.
                    -->



                    <input type="radio"
                           name="gen"
                           id="female"/>

                    <label for="female">
                        Female
                    </label>



                    <input type="radio"
                           name="gen"
                           id="other"/>

                    <label for="other">
                        Other
                    </label>

                </td>

            </tr>



            <tr>

                <td>
                    Enter your Qualification:
                </td>

                <td>

                    <select>

                    <!-- select
                         → Drop-down List create karta hai.
                    -->

                        <option disabled selected>
                            Select your Qualification
                        </option>

                        <!-- option
                             → Drop-down ka ek option.

                             disabled
                             → User is option ko select nahi kar sakta.

                             selected
                             → Default option.
                        -->

                        <option value="bca">

                            BCA

                        </option>

                        <!-- value
                             → Form submit hone par
                               backend ko ye value bheji jati hai.
                        -->



                        <option value="bsc">

                            BSC

                        </option>



                        <option selected value="B.Tech">

                            B.Tech

                        </option>

                        <!-- selected
                             → Page load hote hi
                               ye option selected rahega.
                        -->



                        <option value="mba">

                            MBA

                        </option>



                        <option disabled value="mca">

                            MCA

                        </option>

                        <!-- disabled
                             → Is option ko select nahi kar sakte.
                        -->

                    </select>

                </td>

            </tr>



            <tr>

                <td>

                    University

                </td>

                <td>

                    <select>

                        <option disabled selected>

                            Select your University

                        </option>

                        <option value="Aktu">

                            AKTU

                        </option>

                        <option value="Jnu">

                            JNU

                        </option>

                        <option selected value="Iit">

                            IIT

                        </option>

                        <option value="Nit">

                            NIT

                        </option>

                        <option disabled value="HBTU">

                            HBTU

                        </option>

                    </select>

                    <!--             <tr>

                <td>
                    Date and Time:
                </td>

                <td>

                    <input
                        type="datetime-local"
                        name="meeting"
                        value="2026-06-25T10:30"
                        min="2026-06-25T00:00"
                        max="2026-06-25T23:59">

                    <!-- type="datetime-local"
                         → Date aur Time dono ek saath select karne ke liye.

                         Browser Date + Time Picker show karta hai.

                         Example:
                         25-06-2026 10:30 AM
                    -->

                    <!-- name="meeting"

                         Form submit hone par
                         backend ko data "meeting" naam se bheja jayega.
                    -->

                    <!-- value="2026-06-25T10:30"

                         Default Date aur Time.

                         T ka matlab Time separator hota hai.

                         Format:
                         YYYY-MM-DDTHH:MM
                    -->

                    <!-- min

                         Is Date-Time se pehle value select nahi kar sakte.
                    -->

                    <!-- max

                         Is Date-Time ke baad value select nahi kar sakte.
                    -->

                </td>

            </tr>



            <tr>

                <td>

                    Color:

                </td>

                <td>

                    <input
                        type="color"
                        name="favcolor"
                        value="#ff0000"/>

                    <!-- type="color"

                         Color Picker open karta hai.

                         User apni favourite color choose kar sakta hai.
                    -->

                    <!-- value="#ff0000"

                         Default Color.

                         #ff0000
                         → Red Color

                         Ye Hex Color Code hai.
                    -->

                </td>

            </tr>



            <tr>

                <td>

                    Update your Profile:

                </td>

                <td>

                    <input
                        type="file"
                        accept=".jpg, .jpeg, .png"/>

                    <!-- type="file"

                         User ko file upload karne deta hai.
                    -->

                    <!-- accept

                         Sirf specified file types hi select kar sakte hain.

                         Yaha:

                         .jpg
                         .jpeg
                         .png

                         Sirf Image Files allow hongi.
                    -->

                </td>

            </tr>



            <tr>

                <td>

                    Hidden Value:

                </td>

                <td>

                    <input
                        type="hidden"
                        value="12345"/>

                    <!-- type="hidden"

                         Hidden Input Field.

                         Browser me visible nahi hota.

                         Backend ko hidden data bhejne ke liye use hota hai.

                         Example:

                         User ID
                         Token
                         Session ID
                    -->

                </td>

            </tr>



            <tr>

                <td>

                    Range:

                </td>

                <td>

                    <input
                        type="range"
                        min="0"
                        max="100"/>

                    <!-- type="range"

                         Slider create karta hai.

                         User slider move karke
                         value select karta hai.
                    -->

                    <!-- min

                         Minimum Value.
                    -->

                    <!-- max

                         Maximum Value.
                    -->

                </td>

            </tr>



            <tr>

                <td>

                    Month and Week:

                </td>

                <td>

                    <input type="month"/>
                    <!-- type="month"

                         Sirf Month aur Year select karne ke liye.
                    -->

                    <input type="week"/>
                    <!-- type="week"

                         Year ki specific week select karne ke liye.
                    -->

                </td>

            </tr>



            <tr>

                <td>

                    CGPA:

                </td>

                <td>

                    <input
                        type="number"
                        min="0"
                        max="10"
                        step="0.01"/>

                    <!-- type="number"

                         Numeric Input.
                    -->

                    <!-- min

                         Minimum Value.
                    -->

                    <!-- max

                         Maximum Value.
                    -->

                    <!-- step="0.01"

                         Value kis interval me increase hogi.

                         Example:

                         8.11
                         8.12
                         8.13

                         Decimal values allow karta hai.
                    -->

                </td>

            </tr>



            <tr>

                <td></td>

                <td colspan="2">

                    <input
                        type="submit"
                        value="Register"/>

                    <!-- type="submit"

                         Form submit karta hai.

                         value
                         → Button par dikhne wala text.
                    -->



                    <input
                        type="reset"
                        value="Reset"/>

                    <!-- type="reset"

                         Form ke saare fields ko
                         default value par reset kar deta hai.
                    -->



                    <input
                        type="button"
                        value="Click Me"/>

                    <!-- type="button"

                         Normal Button.

                         Ye khud koi action perform nahi karta.

                         JavaScript ke saath use hota hai.
                    -->



                    <input
                        type="image"
                        src="https://cdn-icons-png.flaticon.com/512/25/25231.png"
                        alt="Submit"
                        width="20"
                        height="20">

                    <!-- type="image"

                         Image ko Submit Button bana deta hai.

                         src
                         → Image ka path.

                         alt
                         → Image load na hone par text.

                         width
                         → Image Width.

                         height
                         → Image Height.
                    -->



                    <button type="button">

                        &#128190;

                    </button>

                    <!-- button

                         HTML Button Tag.

                         input button se zyada powerful hai.

                         Iske andar:

                         Text
                         Icon
                         Image
                         HTML

                         sab likh sakte hain.

                         type="button"

                         Normal Button.
                    -->

                </td>

            </tr>

                         Ye bhi pehle wale select ki tarah hi kaam karta hai.
                    -->

                </td>

            </tr>

        </tbody>

    </table>

</body>
</html>
