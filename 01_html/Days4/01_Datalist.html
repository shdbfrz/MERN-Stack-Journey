<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table  align="center" border="3" width="500px" >
          <tbody >
           <tr>

            <td>
             Enter your name:
            </td>
               <td>
                 <input type="text">
               </td>  </tr> 
               <tr>
              <td>
                 enter the password:
              </td>
              <td>
                 
                <input type="password">
              </td>  </tr>
              <tr>
            <td>

             Date of birth:
            </td>
               <td>
                 <input type="date" min="2026-05-25" max="2026-06-25">
               </td>
              </tr>
             <tr>

            <td>
             Enter your Mobile number:
            </td>
               <td>
                 <input type="number">
               </td>  </tr> 

            <tr>

            <td>
             Enter your Email:
            </td>
               <td>
                 <input type="email">
               </td>  </tr> 

           <tr>

            <td>
             Enter your gender:
            </td>
               <td>
                 <input type="radio" name="gen" id="male"/>
                 <label for="male"> Male</label>
                 <input type="radio" name="gen" id="female"/>
                 <label for="female"> Female</label>
                 <input type="radio" name="gen" id="other"/>
                 <label for="other"> Other</label>
                
               </td>  </tr> 

          <tr>

            <td>
             Enter your Qualification:
            </td>
               <td>
                 <select>
                    <option disabled selected >Select your Qualification</option>
                    <option value="bca">BCA</option>
                    <option value="bsc">BSC</option>
                    <option selected value="B.Tech">B.Tech</option>
                    <option value="mba">MBA</option>
                    <option disabled value="mca">MCA</option>
                 </select>
            </td>
            </tr>
            <tr>
            <td>
             university
            </td>
               <td>
                 <select>
                    <option disabled selected >Select your university</option>
                    <option value="Aktu">AKTU</option>
                    <option value="Jnu">JNU</option>
                    <option selected value="Iit">IIT</option>
                    <option value="Nit">NIT</option>
                    <option disabled value="HBTU">HBTU</option>
                 </select>


               </td>  </tr> 




               <tr>
                  <td>
                    date and time:
                  </td>

          <td>
             
            <input type="datetime-local" name="meeting" value="2026-06-25T10:30" min="2026-06-25T00:00" max="2026-06-25T23:59">
          </td>
               <tr>
                  <td>
                    color:
                  </td>

          <td>
             
            <input type="color" name="favcolor" value="#ff0000"/>
          </td>


          
               <tr>
                  <td>
                    update your profile:
                  </td>

          <td>
             
            <input type="file" accept=".jpg, .jpeg, .png"/>
          </td>
               <tr>
                  <td>
                    hidden value:
                  </td>

          <td>
             
            <input type="hidden"  value="12345"/>
          </td>
               <tr>
                  <td>
                    range:
                  </td>
          <td>
             
            <input type="range" min="0" max="100" />
          </td>
               <tr>
                  <td>
                    mmonth and week:
                  </td>

          <td>
             
            <input type="month" />
            <input type="week" />
          </td>
               <tr>
                  <td>
                    CGPA:
                  </td>

          <td>
             
            <input type="number" min="0" max="10" step="0.01" />
        
          </td>

               <tr> <td></td>
                  <td colspan="2">
                    <input type="submit" value="Register"/>
                    <input type="reset" value="reset"/>
                    <input type="button" value="click me"/>
                    <input type="image" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Submit" width="20" height="20">

                    <button type="button">&#128190;</button>



                  </td>

          <td>
             
            
        
          </td>


               

               
                



               </tr>

          </tbody>



    </table>
</body>
</html>
