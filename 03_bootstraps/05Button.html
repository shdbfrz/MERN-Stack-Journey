<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Bootstrap Example</title>

<body>

<div class="container mt-3"> 

      <button >my button</button>
      <button class ="btn btn-primary">Button</button>
      <button class="btn btn-link">button</button>
      <button class="btn btn-danger">button</button>
      <button class="btn btn-danger btn-sm">button</button>
      <button class="btn btn-danger btn-lg">button</button>
      <button class="btn btn-sm">button</button>
      <button class="btn btn-info">button</button>
      <button class="btn btn-info btn-block">button</button>

      <button class="btn btn-outline-danger btn-outline">button</button>
      

</div>

  

 <div class="container mt-3">

  <span class="badge badge-primary">primary</span>
  <span class="spinner-border text-info"></span>
  <span class="spinner-border spinner-border-sm text-danger"></span>

  <span class="spinner-grow"></span>

 </div>

<div class="container mt-3">

   <div class="progress">

   </div>

   </div>

   </div>
        
</div>
